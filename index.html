<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Job Detector</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🛡️ Fake Job Detector</h1>

        <textarea
            id="jobText"
            placeholder="Paste the job description here..."
        ></textarea>

        <button onclick="checkJob()">Analyze Job</button>

        <div id="loading" style="display:none;">
            <p>🔍 Analyzing job post...</p>
        </div>

        <div class="score-box">
            <div id="scoreText">0%</div>
        </div>

        <div id="result">
            <p>Paste a job description and click Analyze.</p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
